# ============================================
# Spring Boot Application Configuration
# Smart Package Delivery Tracking System
# ============================================

# Application Name
spring.application.name=package-tracker

# Server Configuration
server.port=8080

# ============================================
# H2 Database Configuration (In-Memory)
# ============================================
spring.datasource.url=jdbc:h2:mem:packagetracker
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (for debugging - access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================
# MySQL Database Configuration (Uncomment to use MySQL)
# ============================================
# spring.datasource.url=jdbc:mysql://localhost:3306/package_tracker_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=yourpassword
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / Hibernate Configuration
# ============================================
# Automatically create/update database tables based on entities
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console (useful for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Database dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# For MySQL, use: spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ============================================
# Thymeleaf Configuration
# ============================================
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ============================================
# Logging Configuration
# ============================================
logging.level.root=INFO
logging.level.com.example.packagetracker=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=INFO
